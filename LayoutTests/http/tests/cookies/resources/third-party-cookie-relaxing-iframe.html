<html>
<script src="/js-test-resources/js-test.js"></script>
<script>

const baseurl = "http://localhost:8000/cookies/resources/cookie-utility.py";

window.onmessage = function(event)
{
    if (event.data == "echoCookiesInPopup") {
        echoCookiesInPopup();
        return;
    }

    if (event.data == "deleteCookiesInPopup") {
        deleteCookiesInPopup();
        return;
    }

    tokens = event.data.split(" ");
    if (tokens[0] == "executeCommand") {
        executeCommand(tokens[1]);
        return;
    }

    tokens = event.data.split(":"); 
    if (tokens[0] == "Cookies") {
        didReceiveCookies(event.data.split(":")[1]);
        return;
    }

    debug("Unknown message: " + event.data);
}

function sortCookie(cookie)
{
    var items = cookie.split("; ");
    items.sort();
    return items.join("; ");
}

function didReceiveCookies(cookies)
{
    parent.window.postMessage("Cookies:" + sortCookie(cookies), "*");
}


function deleteCookiesInPopup()
{
    window.open(baseurl + "?queryfunction=deleteCookies", "delete_window");
}

function echoCookiesInPopup()
{
    window.open(baseurl + "?queryfunction=getCookiesAndPostMessage", "echo_window");
}

function executeCommand(command)
{
    var url = command ? baseurl + "?queryfunction=" + command : baseurl;
    let iframeElement = document.createElement("iframe");
    iframeElement.src = url;
    iframeElement.onload = () => {
        iframeContent = iframeElement.contentWindow.document.body.innerHTML;
        parent.window.postMessage(iframeContent, "*");
        iframeElement.remove();
    }
    document.body.appendChild(iframeElement);
}

</script>
<body>
HELLO THERE
</body>
</html>
